name: CI
on:
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - master
  push:
    branches: 
      - master

jobs:
  tests:
    name: Run tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - name: Set up git repository
        uses: actions/checkout@v2
      - name: pwdd
        run: pwd        
      - name: Install zsh
        if: runner.os == 'Linux'
        run: sudo apt-get update; sudo apt-get install zsh; sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"; sudo chsh -s /bin/zsh
      - name: Deps
        run: sh ./install.sh -a /home/runner
      - name: Test installer
        run: ls ~
      - name: pwda
        run: pwd && zsh        
      - name: Check syntax
        run: |
          for file in ~/.oh-my-zsh/oh-my-zsh.sh; do
            zsh "$file" || return 1
          done
